name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            asset: jarvis-lite-linux-x64.tar.gz
          - name: Windows x64
            os: windows-latest
            asset: jarvis-lite-windows-x64.exe
          - name: macOS
            os: macos-latest
            asset: jarvis-lite-macos.dmg

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DJARVIS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/root/bin
          cp build/jarvis-lite dist/root/bin/jarvis-lite
          cp README.md LICENSE dist/root/
          cp scripts/install-unix.sh dist/root/install.sh
          chmod +x dist/root/bin/jarvis-lite dist/root/install.sh
          tar -C dist/root -czf "dist/${{ matrix.asset }}" .

      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          binary_path="$(find build -type f -perm -111 -name jarvis-lite | head -n 1)"
          if [[ -z "${binary_path}" ]]; then
            echo "jarvis-lite binary was not found" >&2
            exit 1
          fi
          mkdir -p dist/root
          cp "${binary_path}" dist/root/jarvis-lite
          cp README.md LICENSE dist/root/
          cp scripts/install-unix.sh dist/root/install.sh
          chmod +x dist/root/jarvis-lite dist/root/install.sh
          hdiutil create -volname "JARVIS Lite" -srcfolder dist/root -ov -format UDZO "dist/${{ matrix.asset }}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $exe = Get-ChildItem -Path build -Recurse -Filter jarvis-lite.exe | Select-Object -First 1
          if (-not $exe) {
            throw "jarvis-lite.exe was not found"
          }
          Copy-Item $exe.FullName "dist/${{ matrix.asset }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
            prerelease="${INPUT_PRERELEASE}"
          else
            tag="${GITHUB_REF_NAME}"
            prerelease="false"
          fi

          notes="dist/release-notes.md"
          cat > "${notes}" <<EOF
          Release packages:

          - Linux: \`jarvis-lite-linux-x64.tar.gz\`
          - Windows: \`jarvis-lite-windows-x64.exe\`
          - macOS: \`jarvis-lite-macos.dmg\`

          JARVIS Lite is a terminal application. Run \`jarvis-lite\` from a terminal after installing it into a directory on your PATH.
          EOF

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "JARVIS Lite ${tag}" --notes-file "${notes}"
          else
            args=(release create "${tag}" --title "JARVIS Lite ${tag}" --notes-file "${notes}" --target "${GITHUB_SHA}")
            if [[ "${prerelease}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi

          gh release upload "${tag}" dist/jarvis-lite-* --clobber
